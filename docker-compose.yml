services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agrodirecto-backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - JWT_SECRET=AgroDirecto2024SantaCruzSecretKey!
      - JWT_EXPIRES_IN=24h
      - DB_PATH=/app/data/agrodirecto.db
      - UPLOAD_DIR=./uploads
      - CORS_ORIGIN=http://localhost:5173,http://localhost:3000,http://localhost
    volumes:
      - ./database:/app/data
      - ./backend/uploads:/app/uploads
    restart: unless-stopped
    networks:
      - agrodirecto-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agrodirecto-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - agrodirecto-net

networks:
  agrodirecto-net:
    driver: bridge
